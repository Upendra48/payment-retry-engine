services:
  web:
    build: .
    container_name: payment_retry_web

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

    volumes:
      - ./src:/app/src

    ports:
      - "8000:8000"

    env_file:
      - .env.example

    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: payment_retry_db

    restart: always

    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: payment_rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: .

    command: celery -A config worker -l info

    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy

    env_file:
      - .env.example

    volumes:
      - ./src:/app/src

  beat:
    build: .

    command: celery -A config beat -l info

    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy

    env_file:
      - .env.example

    volumes:
      - ./src:/app/src

  prometheus:
    image: prom/prometheus:latest
    container_name: payment_prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    depends_on:
      - web     

  grafana:
    image: grafana/grafana:latest
    container_name: payment_grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

    volumes:
      - grafana_data:/var/lib/grafana    


volumes:
  postgres_data:
  grafana_data: